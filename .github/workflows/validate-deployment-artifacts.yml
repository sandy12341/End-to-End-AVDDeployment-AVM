name: Validate Deployment Artifacts

on:
  pull_request:
    paths:
      - 'infra/**'
      - 'README.md'
      - 'docs/**'
      - 'bicepconfig.json'
      - '.github/workflows/validate-deployment-artifacts.yml'
  push:
    branches:
      - master
    paths:
      - 'infra/**'
      - 'README.md'
      - 'docs/**'
      - 'bicepconfig.json'
      - '.github/workflows/validate-deployment-artifacts.yml'

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure CLI login not required for build
        shell: pwsh
        run: az version

      - name: Build deployment artifacts
        shell: pwsh
        run: ./infra/scripts/Build-DeploymentArtifacts.ps1

      - name: Validate generated artifacts exist
        shell: pwsh
        run: |
          $requiredFiles = @(
            'infra/azuredeploy.json',
            'infra/managedapp/dist/mainTemplate.json',
            'infra/managedapp/dist/deployDefinition.json',
            'infra/managedapp/dist/app-new.zip',
            'infra/managedapp/dist/app-existing.zip',
            'infra/managedapp/dist/app-day2.zip',
            'infra/managedapp/dist/app-addhosts.zip',
            'infra/managedapp/dist/app-scaling.zip',
            'infra/managedapp/dist/app-monitoring.zip',
          )

          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path $requiredFile)) {
              throw "Missing required artifact: $requiredFile"
            }
          }

      - name: Validate managed app package contents
        shell: pwsh
        run: |
          $packageNames = @(
            'app-new.zip',
            'app-existing.zip',
            'app-day2.zip',
            'app-addhosts.zip',
            'app-scaling.zip',
            'app-monitoring.zip',
          )

          foreach ($packageName in $packageNames) {
            $zipPath = Join-Path 'infra/managedapp/dist' $packageName
            $extractPath = Join-Path $env:RUNNER_TEMP ([System.IO.Path]::GetFileNameWithoutExtension($packageName))

            if (Test-Path $extractPath) {
              Remove-Item -Recurse -Force $extractPath
            }

            Expand-Archive -Path $zipPath -DestinationPath $extractPath

            $requiredFiles = @(
              'mainTemplate.json',
              'createUiDefinition.json'
            )

            foreach ($requiredFile in $requiredFiles) {
              if (-not (Test-Path (Join-Path $extractPath $requiredFile))) {
                throw "Managed app package $packageName is missing $requiredFile"
              }
            }
          }